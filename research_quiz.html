<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Methodology – Weekly Quiz</title>
<style>
  :root {
    --bg: #0a0e1a;
    --card: rgba(255,255,255,0.05);
    --card-border: rgba(255,255,255,0.12);
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --correct: #10b981;
    --incorrect: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --gold: #f59e0b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  /* ── Starfield ── */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  /* ── Layout ── */
  #app { position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 20px; }
  /* ── Header ── */
  .header {
    text-align: center;
    padding: 40px 20px 30px;
    animation: fadeDown 0.8s ease;
  }
  .header h1 {
    font-size: clamp(1.6rem, 4vw, 2.6rem);
    font-weight: 800;
    background: linear-gradient(135deg, #a78bfa, #38bdf8, #34d399);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -0.5px;
  }
  .header p { color: var(--muted); margin-top: 8px; font-size: 0.95rem; }
  /* ── Week Tabs ── */
  .week-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 0 0 30px;
    animation: fadeUp 0.8s ease 0.1s both;
  }
  .week-tab {
    padding: 8px 16px;
    border-radius: 999px;
    border: 1.5px solid var(--card-border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    font-size: 0.82rem;
    font-weight: 600;
    transition: all 0.25s;
    position: relative;
    overflow: hidden;
  }
  .week-tab:hover { border-color: var(--accent); color: var(--text); }
  .week-tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 0 20px rgba(124,58,237,0.5);
  }
  .week-tab .badge {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    border-radius: 999px;
    padding: 1px 6px;
    font-size: 0.7rem;
    margin-left: 4px;
  }
  .week-tab.done .badge { background: var(--correct); }
  /* ── Progress ── */
  .progress-bar-wrap {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    width: 0%;
  }
  .progress-label { font-size: 0.8rem; color: var(--muted); text-align: right; margin-bottom: 6px; }
  /* ── Week Panel ── */
  .week-panel { display: none; animation: panelIn 0.4s ease; }
  .week-panel.active { display: block; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: none; }
  }
  .week-title {
    font-size: 1.3rem;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--accent2);
  }
  .week-subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
  /* ── Question Card ── */
  .q-card {
    background: var(--card);
    border: 1.5px solid var(--card-border);
    border-radius: 16px;
    padding: 22px 24px;
    margin-bottom: 16px;
    backdrop-filter: blur(12px);
    transition: border-color 0.3s, box-shadow 0.3s;
    position: relative;
    overflow: hidden;
  }
  .q-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .q-card.correct::before { background: rgba(16,185,129,0.06); opacity: 1; }
  .q-card.incorrect::before { background: rgba(239,68,68,0.06); opacity: 1; }
  .q-card.correct { border-color: var(--correct); }
  .q-card.incorrect { border-color: var(--incorrect); }
  .q-num {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .q-type-badge {
    background: rgba(124,58,237,0.2);
    border-radius: 999px;
    padding: 2px 8px;
    font-size: 0.65rem;
    color: #a78bfa;
  }
  .q-type-badge.multi { background: rgba(6,182,212,0.2); color: #67e8f9; }
  .q-type-badge.numeric { background: rgba(245,158,11,0.2); color: #fcd34d; }
  .q-text {
    font-size: 0.97rem;
    line-height: 1.6;
    margin-bottom: 16px;
    font-weight: 500;
  }
  .q-image {
    width: 100%;
    max-width: 640px;
    border-radius: 10px;
    margin: 10px 0 16px;
    border: 1px solid var(--card-border);
    display: block;
  }
  /* ── Options ── */
  .options { display: flex; flex-direction: column; gap: 8px; }
  .option-label {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 16px;
    border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: all 0.2s;
    background: rgba(255,255,255,0.02);
    font-size: 0.9rem;
    line-height: 1.5;
    user-select: none;
  }
  .option-label:hover { border-color: rgba(124,58,237,0.5); background: rgba(124,58,237,0.08); }
  .option-label input { display: none; }
  .option-box {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .option-label.multi .option-box { border-radius: 4px; }
  .option-label.selected .option-box {
    background: var(--accent);
    border-color: var(--accent);
  }
  .option-label.selected .option-box::after {
    content: '✓';
    color: #fff;
    font-size: 11px;
    font-weight: 900;
  }
  .option-label.selected { border-color: var(--accent); background: rgba(124,58,237,0.12); }
  /* After check */
  .option-label.was-correct { border-color: var(--correct) !important; background: rgba(16,185,129,0.1) !important; }
  .option-label.was-correct .option-box { background: var(--correct) !important; border-color: var(--correct) !important; }
  .option-label.was-wrong { border-color: var(--incorrect) !important; background: rgba(239,68,68,0.1) !important; }
  .option-label.was-wrong .option-box { background: var(--incorrect) !important; border-color: var(--incorrect) !important; }
  .option-label.missed { border-color: var(--correct) !important; background: rgba(16,185,129,0.05) !important; }
  .option-label.missed .option-box { border-color: var(--correct) !important; }
  .q-checked .option-label { cursor: default; pointer-events: none; }
  /* ── Numeric input ── */
  .num-input {
    background: rgba(255,255,255,0.05);
    border: 1.5px solid var(--card-border);
    border-radius: 10px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 0.95rem;
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .num-input:focus { border-color: var(--accent); }
  .num-input.correct-num { border-color: var(--correct); background: rgba(16,185,129,0.1); }
  .num-input.incorrect-num { border-color: var(--incorrect); background: rgba(239,68,68,0.1); }
  .num-answer-hint { font-size: 0.82rem; color: var(--muted); margin-top: 6px; }
  /* ── Feedback tag ── */
  .q-feedback {
    font-size: 0.8rem;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 999px;
    display: inline-block;
    margin-top: 12px;
    display: none;
  }
  .q-card.correct .q-feedback { display: inline-block; background: rgba(16,185,129,0.15); color: var(--correct); }
  .q-card.incorrect .q-feedback { display: inline-block; background: rgba(239,68,68,0.15); color: var(--incorrect); }
  .q-card.partial .q-feedback { display: inline-block; background: rgba(245,158,11,0.15); color: var(--gold); }
  .q-card.partial { border-color: var(--gold); }
  /* ── Actions ── */
  .week-actions {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px 0;
    flex-wrap: wrap;
  }
  .btn {
    padding: 12px 28px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    font-size: 0.92rem;
    font-weight: 700;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.5); }
  .btn-secondary {
    background: rgba(255,255,255,0.07);
    color: var(--text);
    border: 1.5px solid var(--card-border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.12); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  /* ── Score Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s;
    backdrop-filter: blur(6px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: linear-gradient(135deg, #1e1b4b, #0f172a);
    border: 1.5px solid rgba(124,58,237,0.4);
    border-radius: 24px;
    padding: 40px;
    max-width: 480px;
    width: 90%;
    text-align: center;
    transform: scale(0.85) translateY(20px);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 40px 100px rgba(0,0,0,0.6), 0 0 60px rgba(124,58,237,0.2);
  }
  .modal-overlay.open .modal { transform: none; }
  .modal-emoji { font-size: 3.5rem; margin-bottom: 16px; }
  .modal-title { font-size: 1.6rem; font-weight: 800; margin-bottom: 8px; }
  .modal-score {
    font-size: 4rem;
    font-weight: 900;
    background: linear-gradient(135deg, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
    margin: 16px 0;
  }
  .modal-detail { color: var(--muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.6; }
  .modal-bars { margin: 20px 0; }
  .modal-bar-row { display: flex; align-items: center; gap: 10px; margin: 6px 0; font-size: 0.82rem; color: var(--muted); }
  .modal-bar-track { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
  .modal-bar-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .modal-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  /* ── Confetti ── */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 200;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  /* ── Animations ── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: none; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: none; }
  }
  /* ── Tooltip for missed ── */
  .missed::after {
    content: '← correct answer';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.7rem;
    color: var(--correct);
    background: rgba(16,185,129,0.15);
    padding: 2px 8px;
    border-radius: 999px;
  }
  /* ── Responsive ── */
  @media (max-width: 600px) {
    #app { padding: 12px; }
    .q-card { padding: 16px; }
    .modal { padding: 28px 20px; }
  }
  /* ── Float animation for stars ── */
  .star { position: absolute; border-radius: 50%; animation: twinkle ease-in-out infinite; }
  @keyframes twinkle {
    0%,100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.4); }
  }
  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--card-border); border-radius: 999px; }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div id="app">
  <div class="header">
    <h1>⚛ Research Methodology</h1>
    <p>8-Week Interactive Quiz &nbsp;·&nbsp; Select a week to begin</p>
  </div>
  <div class="week-tabs" id="weekTabs"></div>
  <div id="weekPanels"></div>
</div>

<!-- Score Modal -->
<div class="modal-overlay" id="scoreModal">
  <div class="modal">
    <div class="modal-emoji" id="modalEmoji">🎉</div>
    <div class="modal-title" id="modalTitle">Week Complete!</div>
    <div class="modal-score" id="modalScore">10/10</div>
    <div class="modal-detail" id="modalDetail"></div>
    <div class="modal-bars" id="modalBars"></div>
    <div class="modal-btns">
      <button class="btn btn-secondary" onclick="closeModal()">Review Answers</button>
      <button class="btn btn-primary" id="modalNextBtn" onclick="goNextWeek()">Next Week →</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────── STARFIELD ───────────────────────
(function(){
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];
  function resize(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  for(let i=0;i<200;i++){
    stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random()*1.5+0.3,
      speed: Math.random()*0.0003+0.0001,
      alpha: Math.random(),
      da: (Math.random()-0.5)*0.01
    });
  }
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    stars.forEach(s=>{
      s.alpha += s.da;
      if(s.alpha<=0||s.alpha>=1) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x*canvas.width, s.y*canvas.height, s.r, 0, Math.PI*2);
      ctx.fillStyle = `rgba(200,210,255,${Math.max(0,Math.min(1,s.alpha))})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ─────────────────────── QUESTION DATA ───────────────────────
const weeks = [
{
  title: "Week 1: Introduction to Research",
  subtitle: "Fundamentals of research, advisor roles, and student mindset",
  questions: [
    { text: "What distinguishes a research degree from other degrees?", type: "single",
      options: ["Emphasis on acquiring general knowledge.", "Focus on developing presentation skills.", "Specialized knowledge in a specific field.", "Completion of coursework and examinations."],
      correct: [2] },
    { text: "What distinguishes a textbook from a research paper?", type: "single",
      options: ["Textbooks provide accumulated knowledge, while research papers explore new frontiers.", "Textbooks are purely theoretical while research papers are only practical.", "Textbooks offer only historical perspectives while research papers discuss future possibilities.", "Textbooks offer predictable outcomes, while research papers are unpredictable."],
      correct: [0] },
    { text: "What is an important step in the early stages of research that involves trial and error?", type: "single",
      options: ["Conducting a literature survey to identify interesting topics.", "Choosing a random topic based on popularity.", "Skipping preliminary research and starting experiments.", "Contributing to the chosen area through research."],
      correct: [0] },
    { text: "What is the relationship between incremental research and path-breaking research?", type: "single",
      options: ["Incremental research leads to path-breaking research.", "Path-breaking research happens randomly without any prior incremental work.", "Incremental research and path-breaking research are unrelated.", "Path-breaking research builds on theoretical assumptions alone."],
      correct: [0] },
    { text: "What are the important factors to consider when selecting a research area and guide/advisor?", type: "single",
      options: ["The appeal and interest in the area of study and the impact it has on the scientific community.", "The convenience of the location of the research lab.", "The flexibility in the research schedule.", "The number of students under the advisor."],
      correct: [0] },
    { text: "What is the role of an advisor in research?", type: "single",
      options: ["To provide day-to-day instructions and guidance on what to do.", "To provide guidance when the student encounters difficulties or loses direction.", "To handle all the research work on behalf of the student.", "To ensure the research adheres strictly to the initial plan."],
      correct: [1] },
    { text: "What are the important characteristics for students to fulfil their role as researchers?", type: "single",
      options: ["Super intelligence and adventurous mindset.", "No work ethic and perseverance.", "Spark of interest and spirit of learning.", "Strong communication skills."],
      correct: [2] },
    { text: "What attitude should a student maintain when pursuing research?", type: "single",
      options: ["A sense of urgency and impatience to achieve immediate results.", "A steady and incremental approach while keeping the long-term goal in mind.", "An obsessive-compulsive disorder to overcome any obstacles.", "A tendency to deviate fully from long-term objectives."],
      correct: [1] },
    { text: "What is the most appropriate underlying motivation for conducting research?", type: "single",
      options: ["To replace manual processes with automated systems alone.", "To address social challenges without prioritizing scientific inquiry.", "To pursue personal interest in science without practical application.", "To gain knowledge that advances understanding and enables meaningful impact."],
      correct: [3] },
    { text: "What is the primary reason for clearly defining the purpose of a research?", type: "single",
      options: ["To decide only the formatting and presentation style of the final research report.", "To establish a clear rationale that guides the formulation of research questions and methodology.", "To expect higher academic ranks and long-term success in life.", "To allow manipulation of research results during the course of the study."],
      correct: [1] }
  ]
},
{
  title: "Week 2: Literature Review",
  subtitle: "References, bibliographic details, and evaluating sources",
  questions: [
    { text: "Which of the following is a recommended criterion to pick a reference article for inclusion in a publication?", type: "single",
      options: ["The article is authored by likely reviewers", "The article is a prior work directly relating to the topic", "The article is authored by someone well known in that topic", "The article appeared in a well known journal"],
      correct: [1] },
    { text: "Which of the following indices is considered as a measure of the impact of a particular article in its area of specialization?", type: "single",
      options: ["Number of likes", "Number of views", "Number of downloads", "Number of articles referring to it"],
      correct: [3] },
    { text: "Which of the following bibliographic details is necessary to retrieve all other details of a digitally published article?", type: "single",
      options: ["ISSN", "ISBN", "DOI", "URL"],
      correct: [2] },
    { text: "Literature review is an activity that typically needs to be carried out:", type: "single",
      options: ["Only at the start of the research", "Only at the end of the research", "Only while publishing a paper", "Throughout the research process"],
      correct: [3] },
    { text: "Compared to peer reviewed journals, websites are:", type: "single",
      options: ["More likely to be reliable", "Equally reliable", "Less likely to be reliable", "Completely incorrect"],
      correct: [2] },
    { text: "Which of the bibliographic fields are generally allowed for use without subscription by publishers?", type: "single",
      options: ["Title, Authors, Volume, Issue, Page number and DOI", "Title, Volume, Issue, Page number, Abstract and Full text", "Title, Authors, Issue, Page number, Abstract and References", "Title, Authors, Volume, Issue, Page number and Abstract"],
      correct: [0] },
    { text: "Which of the following is the best way to refer to the internet location of a published article?", type: "single",
      options: ["URL of the website of publisher", "URL of the author of the article", "URL of the journal", "DOI link of the article"],
      correct: [3] },
    { text: "Which of the following is a sufficient piece of information to retrieve rest of the bibliographic details of an article?", type: "single",
      options: ["DOI link", "Author and Journal", "Journal, Volume and Year", "Author and Year"],
      correct: [0] },
    { text: "Consider you are authoring a scientific document. One of the articles you are referring to has been retracted just before your article went to press and is thus not available any longer. You have come to know of it before uploading the final version. What is the most recommended way to address the missing reference?", type: "single",
      options: ["Add a note in the reference that it has been retracted", "Remove the retracted reference and modify the text and citations accordingly", "Ignore the retraction and leave it to publisher to address", "Replace the reference with another article of same author"],
      correct: [1] },
    { text: "You have received an invitation to submit an article for publication in a journal. Which of the following options best describes the possibility that the journal is fake?", type: "single",
      options: ["The journal has page charges for the articles it publishes", "The journal does not have an editorial board or review process", "The name of the journal is similar to of another reputed journal in the same domain", "The articles of the journal are available for free on internet"],
      correct: [1] }
  ]
},
{
  title: "Week 3: Data Analysis & Signals",
  subtitle: "Exploratory data analysis, signals, and estimation",
  questions: [
    { text: "Which of the following is/are example(s) of exploratory data analysis? (Select all that apply)", type: "multi",
      options: ["Testing that the average salary in an age group is a specified value", "Searching for trends or outliers in a data set", "Histogram analysis of runs scored by a player in cricket", "Analyzing the relationship between variables using linear regression."],
      correct: [1, 2, 3] },
    { text: "Identify the correct statement(s) below: (Select all that apply)", type: "multi",
      options: ["Any deterministic signal can be accurately predicted given sufficient history.", "A stochastic signal always keeps randomly alternating between positive and negative values", "Measurements of steps by the best smart phone of an active individual are deterministic.", "Probability that a batsman, in cricket, will get out on any ball is 0.5."],
      correct: [0] },
    { text: "Which of the following functions is/are linear in time? [Note: This question involves mathematical formulas from the original document. The two correct answers involve: (1) a signal s(t) = A·cos(2πf₀t + φ) where f₀ is constant, and (2) the instantaneous frequency of a linear chirp x(t) = cos(2π(f₀ + kt)t), which is linear in t when f₀ and k are positive constants.] (Select all that apply)", type: "multi",
      options: ["A signal with constant instantaneous frequency f₀ (sinusoidal)", "A signal whose frequency increases linearly (linear chirp — f₀ and k are positive constants)", "A random-phase signal with variable amplitude", "A signal with exponentially growing frequency"],

// ─────────────────────── STATE ───────────────────────
let currentWeek = 0;
let answers = weeks.map(w => w.questions.map(() => null));
let checked = weeks.map(w => w.questions.map(() => false));
let weekScores = new Array(weeks.length).fill(null);

// ─────────────────────── BUILD UI ───────────────────────
function buildUI() {
  buildTabs();
  buildPanels();
  showWeek(0);
}

function buildTabs() {
  const container = document.getElementById('weekTabs');
  weeks.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-tab';
    btn.id = `tab-${i}`;
    btn.onclick = () => showWeek(i);
    btn.innerHTML = `W${i+1} <span class="badge">—</span>`;
    container.appendChild(btn);
  });
}

function buildPanels() {
  const container = document.getElementById('weekPanels');
  weeks.forEach((w, wi) => {
    const panel = document.createElement('div');
    panel.className = 'week-panel';
    panel.id = `panel-${wi}`;
    panel.innerHTML = `
      <div class="week-title">${w.title}</div>
      <div class="week-subtitle">${w.subtitle}</div>
      <div class="progress-label" id="prog-label-${wi}">0 / ${w.questions.length} answered</div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-${wi}"></div></div>
      <div id="questions-${wi}"></div>
      <div class="week-actions">
        <button class="btn btn-primary" id="check-btn-${wi}" onclick="checkWeek(${wi})">Check Answers</button>
        <button class="btn btn-secondary" id="reset-btn-${wi}" onclick="resetWeek(${wi})" style="display:none">↺ Reset Week</button>
      </div>
    `;
    container.appendChild(panel);
    buildQuestions(wi, w.questions, document.getElementById(`questions-${wi}`));
  });
}

function buildQuestions(wi, questions, container) {
  questions.forEach((q, qi) => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${wi}-${qi}`;
    const typeBadge = q.type === 'multi' ? '<span class="q-type-badge multi">Multi-select</span>'
                    : q.type === 'numeric' ? '<span class="q-type-badge numeric">Numeric</span>'
                    : '<span class="q-type-badge">Single choice</span>';
    let optionsHTML = '';
    if (q.type === 'numeric') {
      optionsHTML = `
        <input class="num-input" type="number" step="any" id="num-${wi}-${qi}" 
          oninput="recordNumeric(${wi},${qi},this.value)" placeholder="Enter your answer…">
        <div class="num-answer-hint" id="hint-${wi}-${qi}" style="display:none">💡 ${q.hint || ''}</div>
      `;
    } else {
      optionsHTML = '<div class="options" id="opts-' + wi + '-' + qi + '">';
      q.options.forEach((opt, oi) => {
        optionsHTML += `
          <label class="option-label ${q.type === 'multi' ? 'multi' : ''}" id="opt-${wi}-${qi}-${oi}">
            <input type="${q.type === 'multi' ? 'checkbox' : 'radio'}" 
              name="q${wi}-${qi}" value="${oi}"
              onchange="recordAnswer(${wi},${qi},${oi},this)">
            <span class="option-box"></span>
            <span>${opt}</span>
          </label>`;
      });
      optionsHTML += '</div>';
    }
    const imgHTML = q.hasImage ? `<img src="${IMG_SRC}" class="q-image" alt="Question diagram/table">` : '';
    card.innerHTML = `
      <div class="q-num">Question ${qi+1} ${typeBadge}</div>
      <div class="q-text">${q.text.replace(/\n/g, '<br>')}</div>
      ${imgHTML}
      ${optionsHTML}
      <div class="q-feedback" id="fb-${wi}-${qi}"></div>
    `;
    container.appendChild(card);
  });
}

// ─────────────────────── INTERACTIONS ───────────────────────
function recordAnswer(wi, qi, oi, el) {
  const q = weeks[wi].questions[qi];
  if (q.type === 'single') {
    answers[wi][qi] = [oi];
    document.querySelectorAll(`#opts-${wi}-${qi} .option-label`).forEach((lbl, i) => {
      lbl.classList.toggle('selected', i === oi);
    });
  } else {
    if (!answers[wi][qi]) answers[wi][qi] = [];
    if (el.checked) {
      if (!answers[wi][qi].includes(oi)) answers[wi][qi].push(oi);
    } else {
      answers[wi][qi] = answers[wi][qi].filter(x => x !== oi);
    }
    document.getElementById(`opt-${wi}-${qi}-${oi}`).classList.toggle('selected', el.checked);
  }
  updateProgress(wi);
}

function recordNumeric(wi, qi, val) {
  answers[wi][qi] = val === '' ? null : [parseFloat(val)];
  updateProgress(wi);
}

function updateProgress(wi) {
  const total = weeks[wi].questions.length;
  const done = answers[wi].filter(a => a !== null && (Array.isArray(a) ? a.length > 0 : true)).length;
  document.getElementById(`prog-${wi}`).style.width = `${(done/total)*100}%`;
  document.getElementById(`prog-label-${wi}`).textContent = `${done} / ${total} answered`;
}

function showWeek(idx) {
  document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
  document.getElementById(`panel-${idx}`).classList.add('active');
  document.getElementById(`tab-${idx}`).classList.add('active');
  currentWeek = idx;
  updateProgress(idx);
}

// ─────────────────────── CHECK ───────────────────────
function checkWeek(wi) {
  const w = weeks[wi];
  let totalQ = w.questions.length;
  let totalPoints = 0, maxPoints = 0;
  w.questions.forEach((q, qi) => {
    const card = document.getElementById(`card-${wi}-${qi}`);
    const fb = document.getElementById(`fb-${wi}-${qi}`);
    card.classList.add('q-checked');
    maxPoints += 1;
    if (q.type === 'numeric') {
      const input = document.getElementById(`num-${wi}-${qi}`);
      const hintEl = document.getElementById(`hint-${wi}-${qi}`);
      const val = parseFloat(input.value);
      hintEl.style.display = 'block';
      if (!isNaN(val) && val >= q.correctRange[0] && val <= q.correctRange[1]) {
        card.classList.add('correct'); card.classList.remove('incorrect', 'partial');
        fb.textContent = '✓ Correct!';
        input.classList.add('correct-num');
        totalPoints += 1;
      } else {
        card.classList.add('incorrect'); card.classList.remove('correct', 'partial');
        fb.textContent = `✗ Incorrect — answer: ${q.correctRange[0]} – ${q.correctRange[1]}`;
        input.classList.add('incorrect-num');
      }
      checked[wi][qi] = true;
      return;
    }
    const sel = answers[wi][qi] || [];
    const cor = q.correct;
    // Mark options
    q.options.forEach((_, oi) => {
      const lbl = document.getElementById(`opt-${wi}-${qi}-${oi}`);
      if (!lbl) return;
      const isCor = cor.includes(oi);
      const isSel = sel.includes(oi);
      lbl.classList.remove('selected');
      if (isCor && isSel) lbl.classList.add('was-correct');
      else if (!isCor && isSel) lbl.classList.add('was-wrong');
      else if (isCor && !isSel) lbl.classList.add('missed');
    });
    // Score
    if (q.type === 'single') {
      const isOk = sel.length === 1 && cor.includes(sel[0]);
      if (isOk) { card.classList.add('correct'); fb.textContent = '✓ Correct!'; totalPoints += 1; }
      else { card.classList.add('incorrect'); fb.textContent = '✗ Incorrect'; }
    } else {
      const hits = sel.filter(x => cor.includes(x)).length;
      const wrongs = sel.filter(x => !cor.includes(x)).length;
      if (wrongs > 0) {
        card.classList.add('incorrect'); fb.textContent = '✗ Incorrect (wrong option selected)';
      } else if (hits === cor.length) {
        card.classList.add('correct'); fb.textContent = '✓ Correct!'; totalPoints += 1;
      } else {
        card.classList.add('partial'); fb.textContent = `⚡ Partial (${hits}/${cor.length} correct selected)`;
        totalPoints += hits / cor.length;
      }
    }
    checked[wi][qi] = true;
  });
  weekScores[wi] = { points: totalPoints, max: maxPoints };
  updateTabBadge(wi, totalPoints, maxPoints);
  // Hide check btn, show reset
  document.getElementById(`check-btn-${wi}`).style.display = 'none';
  document.getElementById(`reset-btn-${wi}`).style.display = 'inline-block';
  setTimeout(() => showScoreModal(wi, totalPoints, maxPoints), 600);
}

function updateTabBadge(wi, pts, max) {
  const tab = document.getElementById(`tab-${wi}`);
  const pct = Math.round((pts/max)*100);
  tab.querySelector('.badge').textContent = `${pct}%`;
  tab.classList.add('done');
}

// ─────────────────────── RESET ───────────────────────
function resetWeek(wi) {
  answers[wi] = weeks[wi].questions.map(() => null);
  checked[wi] = weeks[wi].questions.map(() => false);
  weekScores[wi] = null;
  const tab = document.getElementById(`tab-${wi}`);
  tab.querySelector('.badge').textContent = '—';
  tab.classList.remove('done');
  document.getElementById(`check-btn-${wi}`).style.display = 'inline-block';
  document.getElementById(`reset-btn-${wi}`).style.display = 'none';
  // Rebuild questions
  const qContainer = document.getElementById(`questions-${wi}`);
  qContainer.innerHTML = '';
  buildQuestions(wi, weeks[wi].questions, qContainer);
  updateProgress(wi);
}

// ─────────────────────── MODAL ───────────────────────
function showScoreModal(wi, pts, max) {
  const pct = Math.round((pts/max)*100);
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '📚' : '💪';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great Job!' : pct >= 50 ? 'Good Effort!' : 'Keep Studying!';
  document.getElementById('modalEmoji').textContent = emoji;
  document.getElementById('modalTitle').textContent = `${weeks[wi].title.split(':')[0]} Complete!`;
  document.getElementById('modalScore').textContent = `${pts.toFixed(1)} / ${max}`;
  document.getElementById('modalDetail').innerHTML = `<strong>${msg}</strong><br>${pct}% correct on ${weeks[wi].title}`;
  const barsEl = document.getElementById('modalBars');
  barsEl.innerHTML = `<div class="modal-bar-row"><span style="width:80px">Score</span><div class="modal-bar-track"><div class="modal-bar-fill" style="width:${pct}%"></div></div><span>${pct}%</span></div>`;
  const nextBtn = document.getElementById('modalNextBtn');
  if (wi < weeks.length - 1) { nextBtn.style.display = 'inline-block'; nextBtn.textContent = `Week ${wi+2} →`; }
  else { nextBtn.style.display = 'none'; }
  document.getElementById('scoreModal').classList.add('open');
  if (pct >= 70) spawnConfetti();
}

function closeModal() {
  document.getElementById('scoreModal').classList.remove('open');
}

function goNextWeek() {
  closeModal();
  if (currentWeek < weeks.length - 1) showWeek(currentWeek + 1);
}

// ─────────────────────── CONFETTI ───────────────────────
function spawnConfetti() {
  const colors = ['#7c3aed','#06b6d4','#10b981','#f59e0b','#ef4444','#a78bfa'];
  for (let i = 0; i < 60; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.cssText = `
        left: ${Math.random()*100}vw;
        top: -10px;
        background: ${colors[Math.floor(Math.random()*colors.length)]};
        width: ${4+Math.random()*8}px;
        height: ${4+Math.random()*8}px;
        border-radius: ${Math.random()>0.5 ? '50%' : '2px'};
        animation-duration: ${1.5+Math.random()*2}s;
        animation-delay: 0s;
      `;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3500);
    }, i * 30);
  }
}

// Close modal on overlay click
document.getElementById('scoreModal').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

// ─────────────────────── INIT ───────────────────────
